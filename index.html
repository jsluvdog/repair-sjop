<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

// ─── Cloud Storage (JSONBin + localStorage cache) ─────────
const STORAGE_KEY = "shop-records-v3";
const CONFIG_KEY = "shop-cloud-config";

// Config: { apiKey, binId }
function getCloudConfig() {
  try { return JSON.parse(localStorage.getItem(CONFIG_KEY)) || null; } catch { return null; }
}
function setCloudConfig(cfg) {
  localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg));
}

// Local cache
function loadLocalCache() {
  try { const d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : null; } catch { return null; }
}
function saveLocalCache(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) { console.error("Local save:", e); }
}

// JSONBin API
function makeHeaders(apiKey, includeContentType) {
  var h = {};
  if (includeContentType) h["Content-Type"] = "application/json";
  if (apiKey.startsWith("$2a")) { h["X-Master-Key"] = apiKey; } else { h["X-Access-Key"] = apiKey; }
  return h;
}

async function cloudLoad(cfg) {
  const res = await fetch("https://api.jsonbin.io/v3/b/" + cfg.binId + "/latest", {
    headers: makeHeaders(cfg.apiKey, false)
  });
  if (!res.ok) {
    let errMsg = "Cloud load failed: " + res.status;
    try { const errBody = await res.json(); errMsg += " - " + (errBody.message || ""); } catch(ex) {}
    throw new Error(errMsg);
  }
  const json = await res.json();
  const raw = json.record || {};
  // Only keep date keys with array values (strip metadata like _app, _empty, _created)
  const record = {};
  Object.keys(raw).forEach(k => { if (Array.isArray(raw[k])) record[k] = raw[k]; });
  return record;
}

async function cloudSave(cfg, data) {
  const saveData = data && Object.keys(data).length > 0 ? data : { _empty: true };
  const res = await fetch("https://api.jsonbin.io/v3/b/" + cfg.binId, {
    method: "PUT",
    headers: makeHeaders(cfg.apiKey, true),
    body: JSON.stringify(saveData)
  });
  if (!res.ok) {
    let errMsg = "Cloud save failed: " + res.status;
    try { const errBody = await res.json(); errMsg += " - " + (errBody.message || ""); } catch(ex) {}
    throw new Error(errMsg);
  }
  return true;
}

async function cloudCreateBin(apiKey) {
  var headers = makeHeaders(apiKey, true);
  headers["X-Bin-Name"] = "repair-shop-data";
  const res = await fetch("https://api.jsonbin.io/v3/b", {
    method: "POST",
    headers: headers,
    body: JSON.stringify({ _app: "repair-shop", _created: new Date().toISOString() })
  });
  if (!res.ok) {
    let errMsg = "HTTP " + res.status;
    try { const errBody = await res.json(); errMsg += " - " + (errBody.message || JSON.stringify(errBody)); } catch(ex) {}
    throw new Error(errMsg);
  }
  const json = await res.json();
  return json.metadata.id;
}

// Debounced cloud save
let _saveTimer = null;
function debouncedCloudSave(cfg, data) {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async () => {
    try { await cloudSave(cfg, data); } catch(e) { console.error("Cloud sync:", e); }
  }, 800);
}

// Combined load: try cloud first, fall back to local cache
async function loadRecords() {
  const cfg = getCloudConfig();
  if (cfg?.apiKey && cfg?.binId) {
    try {
      const data = await cloudLoad(cfg);
      saveLocalCache(data); // update local cache
      return data;
    } catch(e) {
      console.warn("Cloud load failed, using local cache:", e);
      return loadLocalCache();
    }
  }
  return loadLocalCache();
}

// Combined save: save locally + sync to cloud
function saveRecords(data) {
  saveLocalCache(data);
  const cfg = getCloudConfig();
  if (cfg?.apiKey && cfg?.binId) {
    debouncedCloudSave(cfg, data);
  }
}

// Export data as data.json file download
function exportDataJSON(data) {
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "data.json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Import data from a data.json file
function importDataJSON(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try { resolve(JSON.parse(e.target.result)); } catch(err) { reject(err); }
    };
    reader.onerror = () => reject(reader.error);
    reader.readAsText(file);
  });
}

// ─── Date Helpers ─────────────────────────────────────────
const WEEKDAYS = ["周日","周一","周二","周三","周四","周五","周六"];

function getMondayOfWeek(date) {
  const d = new Date(date);
  const day = d.getDay();
  d.setDate(d.getDate() - ((day === 0 ? 7 : day) - 1));
  d.setHours(0,0,0,0);
  return d;
}

function getWeekDates(mondayDate) {
  const dates = [];
  for (let i = 0; i < 6; i++) {
    const d = new Date(mondayDate);
    d.setDate(mondayDate.getDate() + i);
    dates.push(d.toISOString().slice(0, 10));
  }
  return dates;
}

function fmtDate(ds) {
  const d = new Date(ds + "T00:00:00");
  return `${d.getMonth()+1}月${d.getDate()}日 ${WEEKDAYS[d.getDay()]}`;
}

function fmtWeekRange(dates) {
  const s = new Date(dates[0] + "T00:00:00");
  const e = new Date(dates[dates.length-1] + "T00:00:00");
  return `${s.getMonth()+1}/${s.getDate()} — ${e.getMonth()+1}/${e.getDate()}`;
}

function isToday(ds) { return ds === new Date().toISOString().slice(0, 10); }
function isThisWeek(monday) {
  const now = getMondayOfWeek(new Date());
  return monday.getTime() === now.getTime();
}

function sumItems(arr) {
  return (arr || []).reduce((s, i) => s + (Number(i.cost) || 0) * (Number(i.qty) || 1), 0);
}

// Universal profit calculation: works for both repair and sale
function calcProfit(r) {
  if (r.type === "sale") {
    return (Number(r.salePrice) || 0) - (Number(r.saleCost) || 0);
  }
  if (r.type === "wage") {
    return -(Number(r.wageSettlement) || 0); // wage is pure cost
  }
  if (r.type === "purchase") {
    return -(Number(r.purchaseTotal) || 0); // purchase is pure cost
  }
  return (Number(r.quoted) || 0) - sumItems(r.inventoryUsed) - sumItems(r.newParts);
}

// Universal revenue: what the customer paid (wage/purchase have 0 revenue)
function calcRevenue(r) {
  if (r.type === "sale") return Number(r.salePrice) || 0;
  if (r.type === "wage" || r.type === "purchase") return 0;
  return Number(r.quoted) || 0;
}

// Universal cost
function calcCost(r) {
  if (r.type === "sale") return Number(r.saleCost) || 0;
  if (r.type === "wage") return Number(r.wageSettlement) || 0;
  if (r.type === "purchase") return Number(r.purchaseTotal) || 0;
  return sumItems(r.inventoryUsed) + sumItems(r.newParts);
}

// Type labels
function typeLabel(t) {
  if (t === "repair") return "维修";
  if (t === "sale") return "出售";
  if (t === "wage") return "工资";
  if (t === "purchase") return "采购";
  return t;
}
function uid() { return "r" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

// Vehicle identity = customer + phone + vehicle combined
function generateVehicleId(customer, phone, vehicle, plate) {
  const key = (customer||"").trim().toLowerCase() + "|" + (phone||"").trim() + "|" + (vehicle||"").trim().toLowerCase() + "|" + (plate||"").trim().toUpperCase();
  var hash = 0;
  for (var i = 0; i < key.length; i++) { hash = ((hash << 5) - hash) + key.charCodeAt(i); hash |= 0; }
  return "V-" + Math.abs(hash).toString(36).toUpperCase();
}

const IEdit = () => <Icon d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" size={15}/>;
const IDel = () => <Icon d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" size={15}/>;

const IHistory = () => <Icon d="M3 3v5h5M3 8a9 9 0 1018 0 9 9 0 00-18 0zM12 7v5l3 3" size={16}/>;

const IHome = () => <Icon d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h3a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1h3a1 1 0 001-1V10" size={14}/>;
const IGear = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>;
const IWarn = () => <Icon d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" size={18}/>;
const IPhone = () => <Icon d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z" size={13}/>;
const ISearch = () => <Icon d="M11 3a8 8 0 100 16 8 8 0 000-16zM21 21l-4.35-4.35" size={16} sw={2}/>;

// ─── Main App ─────────────────────────────────────────────
function App() {
  const [records, setRecords] = useState(null);
  const [currentMonday, setCurrentMonday] = useState(() => getMondayOfWeek(new Date()));
  const [view, setView] = useState("week");
  const [selDate, setSelDate] = useState(null);
  const [selRecord, setSelRecord] = useState(null);
  const [selVehicleId, setSelVehicleId] = useState(null);
  const [editingRecord, setEditingRecord] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [loaded, setLoaded] = useState(false);
  const [cloudCfg, setCloudCfg] = useState(() => getCloudConfig());
  const [syncStatus, setSyncStatus] = useState("idle"); // idle | syncing | ok | error
  const [needSetup, setNeedSetup] = useState(() => !getCloudConfig());

  const weekDates = useMemo(() => getWeekDates(currentMonday), [currentMonday]);
  const thisWeek = isThisWeek(currentMonday);

  // Load records
  useEffect(() => {
    (async () => {
      setSyncStatus("syncing");
      try {
        const saved = await loadRecords();
        setRecords(saved || {});
        setSyncStatus(cloudCfg ? "ok" : "idle");
      } catch(e) {
        console.error(e);
        setRecords(loadLocalCache() || {});
        setSyncStatus("error");
      }
      setLoaded(true);
    })();
  }, [cloudCfg]);

  // Save on change
  useEffect(() => {
    if (records && loaded) {
      saveLocalCache(records);
      if (cloudCfg?.apiKey && cloudCfg?.binId) {
        setSyncStatus("syncing");
        clearTimeout(_saveTimer);
        _saveTimer = setTimeout(async () => {
          try {
            await cloudSave(cloudCfg, records);
            setSyncStatus("ok");
          } catch(e) {
            console.error("Sync error:", e);
            setSyncStatus("error");
          }
        }, 800);
      }
    }
  }, [records, loaded]);

  // Manual refresh from cloud
  const refreshFromCloud = useCallback(async () => {
    if (!cloudCfg) return;
    setSyncStatus("syncing");
    try {
      const data = await cloudLoad(cloudCfg);
      saveLocalCache(data);
      setRecords(data);
      setSyncStatus("ok");
    } catch(e) {
      setSyncStatus("error");
    }
  }, [cloudCfg]);

  // Auto-poll every 30 seconds + refresh when tab becomes visible
  useEffect(() => {
    if (!cloudCfg || !loaded) return;
    const interval = setInterval(() => {
      if (document.visibilityState === "visible") {
        cloudLoad(cloudCfg).then(data => {
          saveLocalCache(data);
          setRecords(data);
          setSyncStatus("ok");
        }).catch(() => {});
      }
    }, 30000);
    const onVisible = () => {
      if (document.visibilityState === "visible" && cloudCfg) {
        cloudLoad(cloudCfg).then(data => {
          saveLocalCache(data);
          setRecords(data);
          setSyncStatus("ok");
        }).catch(() => {});
      }
    };
    document.addEventListener("visibilitychange", onVisible);
    return () => { clearInterval(interval); document.removeEventListener("visibilitychange", onVisible); };
  }, [cloudCfg, loaded]);

  const allRecords = useMemo(() => records ? Object.values(records).filter(v => Array.isArray(v)).flat() : [], [records]);

  const vehicleHistory = useMemo(() => {
    if (!selVehicleId) return [];
    return allRecords.filter(r => r.vehicleId === selVehicleId).sort((a, b) => a.date.localeCompare(b.date));
  }, [selVehicleId, allRecords]);

  const goWeek = () => { setView("week"); setSelDate(null); setSelRecord(null); setSelVehicleId(null); setShowForm(false); };
  const goDay = (d) => { setSelDate(d); setView("day"); setSelRecord(null); setShowForm(false); };
  const goRecord = (r) => { setSelRecord(r); setView("record"); setShowForm(false); setSelDate(r.date); };
  const goVehicleHistory = (vid) => { setSelVehicleId(vid); setView("vehicleHistory"); };
  const goSearch = () => { setView("search"); setShowForm(false); };

  const prevWeek = () => {
    const d = new Date(currentMonday);
    d.setDate(d.getDate() - 7);
    setCurrentMonday(d);
    goWeek();
  };
  const nextWeek = () => {
    const d = new Date(currentMonday);
    d.setDate(d.getDate() + 7);
    setCurrentMonday(d);
    goWeek();
  };
  const goThisWeek = () => {
    setCurrentMonday(getMondayOfWeek(new Date()));
    goWeek();
  };

  const handleSaveRecord = useCallback((rec, isNew) => {
    setRecords(prev => {
      const next = {};
      // Copy only array entries
      Object.keys(prev || {}).forEach(dk => { if (Array.isArray(prev[dk])) next[dk] = [...prev[dk]]; });
      const dateKey = rec.date;
      if (!next[dateKey]) next[dateKey] = [];
      if (isNew) {
        next[dateKey] = [...next[dateKey], rec];
      } else {
        Object.keys(next).forEach(dk => { next[dk] = next[dk].filter(r => r.id !== rec.id); });
        if (!next[dateKey]) next[dateKey] = [];
        next[dateKey] = [...next[dateKey], rec];
      }
      Object.keys(next).forEach(dk => { if (!next[dk] || next[dk].length === 0) delete next[dk]; });
      return next;
    });
    setShowForm(false);
    setSelRecord(rec);
    setView("record");
    setSelDate(rec.date);
  }, []);

  const handleDeleteRecord = useCallback((rec) => {
    const dateKey = rec.date;
    setRecords(prev => {
      const next = {};
      Object.keys(prev || {}).forEach(dk => { if (Array.isArray(prev[dk])) next[dk] = [...prev[dk]]; });
      Object.keys(next).forEach(dk => { next[dk] = next[dk].filter(r => r.id !== rec.id); });
      Object.keys(next).forEach(dk => { if (!next[dk] || next[dk].length === 0) delete next[dk]; });
      return next;
    });
    setSelRecord(null);
    setSelDate(dateKey);
    setView("day");
  }, []);

  const handleReset = useCallback(async () => {
    setRecords({});
    goWeek();
  }, []);

  const handleImport = useCallback((data) => {
    setRecords(data);
    goWeek();
  }, []);

  if (!loaded && !needSetup) {
    return <div style={S.root}><div style={S.loadingWrap}><div style={S.spinner}/><p style={{color:"#71717a",marginTop:12,fontSize:13}}>正在同步云端数据...</p></div></div>;
  }

  if (needSetup) {
    return <CloudSetup onComplete={(cfg) => {
      setCloudConfig(cfg);
      setCloudCfg(cfg);
      setNeedSetup(false);
    }} />;
  }

  const syncDot = syncStatus === "syncing" ? "#fbbf24" : syncStatus === "ok" ? "#4ade80" : syncStatus === "error" ? "#f87171" : "#52525b";
  const syncLabel = syncStatus === "syncing" ? "同步中..." : syncStatus === "ok" ? "已同步" : syncStatus === "error" ? "同步失败" : "本地";

  return (
    <div style={S.root}>
      <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
      <style>{`
        @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        @keyframes spin { to { transform:rotate(360deg); } }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
        button:hover { filter: brightness(1.15); }
        input:focus, textarea:focus, select:focus { outline:none; border-color:rgba(96,165,250,0.5)!important; box-shadow:0 0 0 2px rgba(96,165,250,0.15)!important; }
        ::placeholder { color: #52525b; }
        ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:3px; }
      `}</style>

      <header style={S.header}>
        <div style={S.headerInner}>
          {view !== "week" && view !== "settings" && view !== "search" && !showForm && (
            <button style={S.navBtn} onClick={() => {
              if (view === "vehicleHistory") goRecord(selRecord);
              else if (view === "record") goDay(selDate);
              else goWeek();
            }}><IBack/></button>
          )}
          {(view === "settings" || view === "search") && (
            <button style={S.navBtn} onClick={goWeek}><IBack/></button>
          )}
          {showForm && (
            <button style={S.navBtn} onClick={() => { setShowForm(false); setEditingRecord(null); }}><IClose/></button>
          )}
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <h1 style={S.title}>
                {showForm ? (editingRecord?.id ? "编辑记录" : "新增记录") :
                 view === "week" ? "维修记录" :
                 view === "day" ? fmtDate(selDate) :
                 view === "record" ? "记录详情" :
                 view === "settings" ? "设置" :
                 view === "search" ? "搜索" : "车辆历史"}
              </h1>
              {/* Sync indicator */}
              {view === "week" && !showForm && (
                <button onClick={refreshFromCloud} style={{background:"none",border:"none",display:"flex",alignItems:"center",gap:4,padding:"2px 6px",borderRadius:6,cursor:"pointer"}} title={"点击刷新 · " + syncLabel}>
                  <div style={{width:7,height:7,borderRadius:"50%",background:syncDot,animation:syncStatus==="syncing"?"pulse 1s infinite":"none"}}/>
                  <span style={{fontSize:10,color:"#52525b",fontFamily:"'IBM Plex Mono',monospace"}}>{syncLabel}</span>
                </button>
              )}
            </div>
            {view === "week" && !showForm && (
              <p style={S.subtitle}>{fmtWeekRange(weekDates)} {thisWeek ? "· 本周" : ""}</p>
            )}
            {view !== "week" && view !== "settings" && view !== "search" && !showForm && (
              <p style={S.subtitle}>
                {view === "day" ? `共 ${(records[selDate]||[]).length} 条记录` :
                 view === "record" ? selRecord?.vehicle :
                 vehicleHistory[0]?.vehicle || ""}
              </p>
            )}
            {view === "settings" && <p style={S.subtitle}>数据管理</p>}
            {view === "search" && <p style={S.subtitle}>按客户名、手机号、车型或车牌搜索</p>}
            {showForm && <p style={S.subtitle}>{selDate ? fmtDate(selDate) : "选择日期"}</p>}
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            {view === "week" && !showForm && (
              <>
                <button style={S.navBtn} onClick={prevWeek} title="上一周"><IChevronL/></button>
                {!thisWeek && <button style={{...S.navBtn,padding:"0 8px",fontSize:11,width:"auto",gap:3}} onClick={goThisWeek} title="回到本周"><IHome/><span>本周</span></button>}
                <button style={S.navBtn} onClick={nextWeek} title="下一周"><IChevronR/></button>
                <div style={{width:1,height:20,background:"rgba(255,255,255,0.06)",margin:"0 2px"}}/>
                <button style={S.navBtn} onClick={goSearch} title="搜索"><ISearch/></button>
                <button style={S.navBtn} onClick={()=>setView("settings")} title="设置"><IGear/></button>
              </>
            )}
            {(view === "day" && !showForm) && (
              <button style={S.addBtn} onClick={() => { setEditingRecord(null); setShowForm(true); }}>
                <IPlus/><span style={{marginLeft:4}}>新增</span>
              </button>
            )}
          </div>
        </div>
      </header>

      <main style={S.main}>
        {showForm ? (
          <RecordForm
            initial={editingRecord}
            defaultDate={selDate}
            allRecords={allRecords}
            onSave={handleSaveRecord}
            onCancel={() => { setShowForm(false); setEditingRecord(null); }}
          />
        ) : (
          <>
            {view === "week" && <WeekView dates={weekDates} data={records} onSelect={goDay}/>}
            {view === "day" && <DayView records={records[selDate]||[]} onSelect={goRecord}/>}
            {view === "record" && selRecord && (
              <RecordDetail
                record={selRecord}
                onViewHistory={goVehicleHistory}
                onEdit={() => { setEditingRecord(selRecord); setShowForm(true); }}
                onDelete={() => handleDeleteRecord(selRecord)}
              />
            )}
            {view === "vehicleHistory" && (
              <VehicleHistoryView
                history={vehicleHistory}
                currentId={selRecord?.id}
                onSelect={(r) => { setSelRecord(r); setSelDate(r.date); setView("record"); }}
              />
            )}
            {view === "settings" && (
              <SettingsView onReset={handleReset} totalRecords={allRecords.length} records={records} onImport={handleImport} cloudCfg={cloudCfg} onCloudDisconnect={() => { localStorage.removeItem(CONFIG_KEY); setCloudCfg(null); setNeedSetup(true); }} onRefresh={refreshFromCloud} syncStatus={syncStatus}/>
            )}
            {view === "search" && (
              <SearchView allRecords={allRecords} onSelectRecord={goRecord} onSelectVehicle={goVehicleHistory}/>
            )}
          </>
        )}
      </main>
    </div>
  );
}

// ─── Week View ────────────────────────────────────────────
function WeekView({ dates, data, onSelect }) {
  // Weekly totals
  const weekTotals = useMemo(() => {
    let q=0, cost=0, h=0, count=0;
    dates.forEach(d => {
      (Array.isArray(data[d]) ? data[d] : []).forEach(r => {
        q += calcRevenue(r);
        cost += calcCost(r);
        h += Number(r.hours||0);
        count++;
      });
    });
    return { q, cost, h, count, profit: q - cost };
  }, [dates, data]);

  return (
    <div>
      {weekTotals.count > 0 && (
        <div style={S.weekSummary}>
          <div style={S.wsStat}><span style={S.wsLabel}>本周总计</span><span style={S.wsCount}>{weekTotals.count} 单</span></div>
          <div style={{textAlign:"center",padding:"10px 0 14px",marginBottom:12,borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
            <span style={{fontSize:11,color:weekTotals.profit>=0?"#4ade80":"#f87171",display:"block",marginBottom:2}}>本周利润</span>
            <span style={{fontSize:28,fontWeight:700,fontFamily:"'IBM Plex Mono',monospace",color:weekTotals.profit>=0?"#4ade80":"#f87171"}}>${weekTotals.profit.toLocaleString()}</span>
          </div>
          <div style={S.wsNumbers}>
            <div><span style={S.wsSmLabel}>收入</span><span style={S.wsGreen}>${weekTotals.q.toLocaleString()}</span></div>
            <div><span style={S.wsSmLabel}>成本</span><span style={S.wsMuted}>${weekTotals.cost.toLocaleString()}</span></div>
            <div><span style={S.wsSmLabel}>工时</span><span style={S.wsMuted}>{weekTotals.h}h</span></div>
          </div>
        </div>
      )}
      <div style={S.cardGrid}>
        {dates.map((d, i) => {
          const recs = Array.isArray(data[d]) ? data[d] : [];
          const totalQ = recs.reduce((s,r)=>s+calcRevenue(r),0);
          const totalCost = recs.reduce((s,r)=>s+calcCost(r),0);
          const totalH = recs.reduce((s,r)=>s+(Number(r.hours)||0),0);
          const dayProfit = totalQ - totalCost;
          const today = isToday(d);
          return (
            <button key={d} style={{...S.dayCard, animationDelay:`${i*60}ms`, ...(today?S.dayCardToday:{})}} onClick={()=>onSelect(d)}>
              <div style={S.dayCardHeader}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={S.dayCardDate}>{fmtDate(d)}</span>
                  {today && <span style={S.todayBadge}>今天</span>}
                </div>
                <span style={S.dayCardCount}>{recs.length}</span>
              </div>
              {recs.length > 0 ? (
                <>
                  {/* Profit highlight */}
                  <div style={{marginBottom:10,padding:"8px 10px",borderRadius:8,background:dayProfit>=0?"rgba(74,222,128,0.06)":"rgba(248,113,113,0.06)",border:dayProfit>=0?"1px solid rgba(74,222,128,0.12)":"1px solid rgba(248,113,113,0.12)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontSize:11.5,color:dayProfit>=0?"#4ade80":"#f87171"}}>当日利润</span>
                      <span style={{fontSize:15,fontWeight:700,fontFamily:"'IBM Plex Mono',monospace",color:dayProfit>=0?"#4ade80":"#f87171"}}>${dayProfit.toLocaleString()}</span>
                    </div>
                  </div>
                  <div style={S.dayCardBody}>
                    <div style={S.statRow}><span style={S.statLabel}>收入</span><span style={S.valGreen}>${totalQ.toLocaleString()}</span></div>
                    <div style={S.statRow}><span style={S.statLabel}>成本</span><span style={S.valMuted}>${totalCost.toLocaleString()}</span></div>
                    <div style={{...S.statRow,borderTop:"1px solid rgba(255,255,255,0.05)",paddingTop:7,marginTop:3}}>
                      <span style={S.statLabel}>工时</span><span style={S.valMuted}>{totalH}h</span>
                    </div>
                  </div>
                  <div style={S.dayCardFooter}>
                    {recs.slice(0,3).map(r=>(
                      <span key={r.id} style={S.vehicleChip}>{(r.vehicle||"").split("·")[0].trim().split(" ").slice(0,3).join(" ")}</span>
                    ))}
                    {recs.length > 3 && <span style={S.chipMore}>+{recs.length-3}</span>}
                  </div>
                </>
              ) : (
                <div style={{padding:"14px 0 4px",textAlign:"center"}}>
                  <span style={{fontSize:12,color:"#3f3f46"}}>暂无记录</span>
                </div>
              )}
              <div style={S.dayCardArrow}><IChevronR/></div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ─── Day View ─────────────────────────────────────────────
function DayView({ records, onSelect }) {
  if (records.length === 0) {
    return (
      <div style={S.emptyState}>
        <ICar/>
        <p style={{color:"#52525b",margin:"12px 0 0",fontSize:14}}>当天暂无记录</p>
        <p style={{color:"#3f3f46",margin:"4px 0 0",fontSize:12}}>点击右上角「新增」添加</p>
      </div>
    );
  }

  const dayTotals = useMemo(() => {
    let q=0, cost=0, h=0;
    records.forEach(r => {
      q += calcRevenue(r);
      cost += calcCost(r);
      h += Number(r.hours||0);
    });
    return { q, cost, h, profit: q - cost };
  }, [records]);

  return (
    <div style={S.listCol}>
      {/* Daily summary */}
      <div style={{...S.weekSummary,animation:"fadeUp 0.25s ease both"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontSize:13,fontWeight:500,color:"#fafafa"}}>当日汇总</span>
          <span style={{fontSize:12,fontFamily:"'IBM Plex Mono',monospace",color:"#a1a1aa",background:"rgba(255,255,255,0.05)",padding:"2px 8px",borderRadius:6}}>{records.length} 单</span>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",padding:"6px 0 12px",marginBottom:10,borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
          <div style={{textAlign:"center"}}>
            <span style={{fontSize:11,color:dayTotals.profit>=0?"#4ade80":"#f87171",display:"block",marginBottom:2}}>当日利润</span>
            <span style={{fontSize:26,fontWeight:700,fontFamily:"'IBM Plex Mono',monospace",color:dayTotals.profit>=0?"#4ade80":"#f87171"}}>${dayTotals.profit.toLocaleString()}</span>
          </div>
        </div>
        <div style={{display:"flex",gap:16,flexWrap:"wrap",justifyContent:"center"}}>
          <span style={{fontSize:12,color:"#71717a"}}>收入 <span style={{color:"#4ade80",fontFamily:"'IBM Plex Mono',monospace"}}>${dayTotals.q.toLocaleString()}</span></span>
          <span style={{fontSize:12,color:"#71717a"}}>成本 <span style={{color:"#a1a1aa",fontFamily:"'IBM Plex Mono',monospace"}}>${dayTotals.cost.toLocaleString()}</span></span>
          <span style={{fontSize:12,color:"#71717a"}}>工时 <span style={{color:"#a1a1aa",fontFamily:"'IBM Plex Mono',monospace"}}>{dayTotals.h}h</span></span>
        </div>
      </div>

      {records.map((r,i) => {
        const inv = sumItems(r.inventoryUsed);
        const np = sumItems(r.newParts);
        const profit = calcProfit(r);
        return (
          <button key={r.id} style={{...S.recordCard, animationDelay:`${i*50}ms`}} onClick={()=>onSelect(r)}>
            <div style={S.rcTop}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={S.badge(r.type)}>{typeLabel(r.type)}</span>
                <span style={S.custName}>{r.type==="wage"?(r.wageName||r.customer):r.type==="purchase"?(r.purchaseItem||r.customer):r.customer}</span>
              </div>
              <span style={S.rcQuoted}>{r.type==="wage"||r.type==="purchase"?"-$"+calcCost(r).toLocaleString():"$"+calcRevenue(r).toLocaleString()}</span>
            </div>
            {(r.type==="repair"||r.type==="sale") && <div style={S.rcVehicle}><ICar/><span style={{marginLeft:6}}>{r.vehicle}{r.plate ? " · "+r.plate : ""}</span></div>}
            {(r.type==="repair"||r.type==="sale") && r.phone && <div style={{display:"flex",alignItems:"center",fontSize:12,color:"#71717a",marginBottom:8}}><IPhone/><span style={{marginLeft:5}}>{r.phone}</span></div>}
            <div style={S.rcMeta}>
              {r.type==="repair" ? <>
                <span style={S.metaI}><IWrench/> 库存 ${inv}</span>
                <span style={S.metaI}><ITag/> 新购 ${np}</span>
                <span style={S.metaI}><IClock/> {r.hours}h</span>
              </> : r.type==="sale" ? <>
                <span style={S.metaI}>成本 ${Number(r.saleCost||0).toLocaleString()}</span>
                <span style={{...S.metaI,color:profit>=0?"#4ade80":"#f87171"}}>利润 ${profit.toLocaleString()}</span>
              </> : r.type==="wage" ? <>
                <span style={S.metaI}>时薪 ${Number(r.wageRate||0)}/h</span>
                <span style={S.metaI}>{Number(r.wageHours||0)}h</span>
                <span style={{...S.metaI,color:"#f87171"}}>结算 ${Number(r.wageSettlement||0).toLocaleString()}</span>
              </> : <>
                <span style={S.metaI}>${Number(r.purchaseUnitPrice||0)} × {Number(r.purchaseQty||0)}</span>
                <span style={{...S.metaI,color:"#f87171"}}>总额 ${Number(r.purchaseTotal||0).toLocaleString()}</span>
              </>}
            </div>
            {r.note && <p style={S.rcNote}>{r.note}</p>}
          </button>
        );
      })}
    </div>
  );
}

// ─── Record Detail ────────────────────────────────────────
function RecordDetail({ record: r, onViewHistory, onEdit, onDelete }) {
  const [confirmDel, setConfirmDel] = useState(false);
  const inv = sumItems(r.inventoryUsed);
  const np = sumItems(r.newParts);
  const profit = calcProfit(r);
  const revenue = calcRevenue(r);
  const cost = calcCost(r);

  return (
    <div style={S.detailCol}>
      <div style={S.detailTop}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <span style={S.badge(r.type)}>{typeLabel(r.type)}</span>
            <h2 style={S.detailCust}>{r.type==="wage"?(r.wageName||r.customer):r.type==="purchase"?(r.purchaseItem||r.customer):r.customer}</h2>
            {(r.type==="repair"||r.type==="sale") && r.phone && <p style={{fontSize:13,color:"#a1a1aa",margin:"0 0 2px",display:"flex",alignItems:"center",gap:5}}><IPhone/>{r.phone}</p>}
            {(r.type==="repair"||r.type==="sale") && <p style={S.detailVeh}>{r.vehicle}{r.plate ? " · "+r.plate : ""}</p>}
            <p style={S.detailDateText}>{fmtDate(r.date)}</p>
          </div>
          <div style={{textAlign:"right"}}>
            <span style={{fontSize:11,color:"#71717a"}}>{r.type==="sale"?"成交价":r.type==="wage"?"结算":r.type==="purchase"?"总金额":"报价收入"}</span>
            <div style={{...S.detailBigQ,color:r.type==="wage"||r.type==="purchase"?"#f87171":"#4ade80"}}>{r.type==="wage"||r.type==="purchase"?"-":""}${(r.type==="wage"?Number(r.wageSettlement||0):r.type==="purchase"?Number(r.purchaseTotal||0):revenue).toLocaleString()}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,marginTop:16,flexWrap:"wrap"}}>
          <button style={S.actionBtn} onClick={onEdit}><IEdit/><span style={{marginLeft:5}}>编辑</span></button>
          <button style={{...S.actionBtn,...S.dangerBtn}} onClick={()=>setConfirmDel(true)}><IDel/><span style={{marginLeft:5}}>删除</span></button>
          {(r.type==="repair"||r.type==="sale") && <button style={{...S.actionBtn,flex:1}} onClick={()=>onViewHistory(r.vehicleId)}><IHistory/><span style={{marginLeft:5}}>该车历史</span></button>}
        </div>
        {confirmDel && (
          <div style={S.confirmBar}>
            <span style={{fontSize:13,color:"#f87171"}}>确认删除？</span>
            <div style={{display:"flex",gap:8}}>
              <button style={S.confirmYes} onClick={onDelete}>确认</button>
              <button style={S.confirmNo} onClick={()=>setConfirmDel(false)}>取消</button>
            </div>
          </div>
        )}
      </div>

      {/* Repair detail */}
      {r.type === "repair" && (
        <div style={S.section}>
          <h3 style={S.secTitle}>费用明细</h3>
          {(r.inventoryUsed||[]).length > 0 && (
            <div style={{marginBottom:16}}>
              <p style={S.subLabel}>库存出库（已在仓库）</p>
              {r.inventoryUsed.map((it,i)=>(
                <div key={i} style={S.lineItem}><span>{it.item} x{it.qty}</span><span style={S.lineCost}>${(it.cost*it.qty).toLocaleString()}</span></div>
              ))}
              <div style={S.lineTotal}><span>小计</span><span>${inv.toLocaleString()}</span></div>
            </div>
          )}
          {(r.newParts||[]).length > 0 && (
            <div style={{marginBottom:16}}>
              <p style={S.subLabel}>新购配件支出（新购入的）</p>
              {r.newParts.map((it,i)=>(
                <div key={i} style={S.lineItem}><span>{it.item} x{it.qty}</span><span style={S.lineCost}>${(it.cost*it.qty).toLocaleString()}</span></div>
              ))}
              <div style={S.lineTotal}><span>小计</span><span>${np.toLocaleString()}</span></div>
            </div>
          )}
          {(r.inventoryUsed||[]).length===0 && (r.newParts||[]).length===0 && (
            <p style={{color:"rgba(255,255,255,0.25)",fontSize:13}}>无配件记录</p>
          )}
          <div style={S.profitRow}>
            <div><span style={S.profitLabel}>利润</span><span style={S.profitSub}>(报价 - 库存 - 新购)</span></div>
            <span style={{...S.profitVal,color:profit>=0?"#4ade80":"#f87171"}}>${profit.toLocaleString()}</span>
          </div>
        </div>
      )}

      {/* Sale detail */}
      {r.type === "sale" && (
        <div style={S.section}>
          <h3 style={S.secTitle}>交易明细</h3>
          <div style={S.lineItem}><span>成交价</span><span style={{...S.lineCost,color:"#4ade80"}}>${Number(r.salePrice||0).toLocaleString()}</span></div>
          <div style={S.lineItem}><span>成本价</span><span style={S.lineCost}>${Number(r.saleCost||0).toLocaleString()}</span></div>
          <div style={S.profitRow}>
            <div><span style={S.profitLabel}>利润</span><span style={S.profitSub}>(成交 - 成本)</span></div>
            <span style={{...S.profitVal,color:profit>=0?"#4ade80":"#f87171"}}>${profit.toLocaleString()}</span>
          </div>
        </div>
      )}

      {/* Wage detail */}
      {r.type === "wage" && (
        <div style={S.section}>
          <h3 style={S.secTitle}>工资明细</h3>
          <div style={S.lineItem}><span>员工</span><span style={S.lineCost}>{r.wageName}</span></div>
          <div style={S.lineItem}><span>时薪</span><span style={S.lineCost}>${Number(r.wageRate||0).toLocaleString()}/h</span></div>
          <div style={S.lineItem}><span>工时</span><span style={S.lineCost}>{Number(r.wageHours||0)}h</span></div>
          <div style={{...S.lineItem,fontSize:11,color:"#52525b"}}><span>参考金额 (时薪×工时)</span><span>${(Number(r.wageRate||0)*Number(r.wageHours||0)).toLocaleString()}</span></div>
          <div style={S.profitRow}>
            <div><span style={S.profitLabel}>实际结算</span></div>
            <span style={{...S.profitVal,color:"#f87171"}}>-${Number(r.wageSettlement||0).toLocaleString()}</span>
          </div>
        </div>
      )}

      {/* Purchase detail */}
      {r.type === "purchase" && (
        <div style={S.section}>
          <h3 style={S.secTitle}>采购明细</h3>
          <div style={S.lineItem}><span>配件名称</span><span style={S.lineCost}>{r.purchaseItem}</span></div>
          <div style={S.lineItem}><span>单价</span><span style={S.lineCost}>${Number(r.purchaseUnitPrice||0).toLocaleString()}</span></div>
          <div style={S.lineItem}><span>数量</span><span style={S.lineCost}>{Number(r.purchaseQty||0)}</span></div>
          <div style={S.profitRow}>
            <div><span style={S.profitLabel}>总金额</span></div>
            <span style={{...S.profitVal,color:"#f87171"}}>-${Number(r.purchaseTotal||0).toLocaleString()}</span>
          </div>
        </div>
      )}

      {/* Time & Notes */}
      <div style={S.section}>
        {r.type === "repair" && (
          <div style={{display:"flex",gap:24}}>
            <div>
              <p style={S.subLabel}>工作时长</p>
              <p style={S.bigNum}>{r.hours}<span style={S.bigUnit}>小时</span></p>
            </div>
          </div>
        )}
        {r.note && (
          <div style={{marginTop:16,paddingTop:16,borderTop:"1px solid rgba(255,255,255,0.06)"}}>
            <p style={S.subLabel}>备注</p>
            <p style={S.noteText}>{r.note}</p>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Vehicle History ──────────────────────────────────────
function VehicleHistoryView({ history, currentId, onSelect }) {
  return (
    <div style={S.listCol}>
      {history.map((r,i) => {
        const cur = r.id === currentId;
        const inv = sumItems(r.inventoryUsed);
        const np = sumItems(r.newParts);
        return (
          <div key={r.id} style={{display:"flex",gap:14,animation:"fadeUp 0.35s ease both",animationDelay:`${i*50}ms`}}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",paddingTop:18,width:18,flexShrink:0}}>
              <div style={{width:cur?12:8,height:cur?12:8,borderRadius:"50%",background:cur?"#60a5fa":"rgba(255,255,255,0.15)",border:cur?"2px solid rgba(96,165,250,0.3)":"none",flexShrink:0}}/>
              {i<history.length-1 && <div style={{width:1,flex:1,background:"rgba(255,255,255,0.08)",marginTop:4}}/>}
            </div>
            <button style={{...S.recordCard,flex:1,marginBottom:0,...(cur?{border:"1px solid rgba(96,165,250,0.3)",background:"rgba(59,130,246,0.06)"}:{})}} onClick={()=>onSelect(r)}>
              <div style={S.rcTop}>
                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                  <span style={{fontSize:13,fontFamily:"'IBM Plex Mono',monospace",color:"#d4d4d8"}}>{fmtDate(r.date)}</span>
                  <span style={S.badge(r.type)}>{typeLabel(r.type)}</span>
                  {cur && <span style={S.curBadge}>当前</span>}
                </div>
                <span style={S.rcQuoted}>${calcRevenue(r).toLocaleString()}</span>
              </div>
              <div style={S.rcMeta}>
                {r.type==="repair" ? <>
                  <span style={S.metaI}><IWrench/> 库存 ${inv}</span>
                  <span style={S.metaI}><ITag/> 新购 ${np}</span>
                  <span style={S.metaI}><IClock/> {r.hours}h</span>
                </> : r.type==="sale" ? <>
                  <span style={S.metaI}>成本 ${Number(r.saleCost||0).toLocaleString()}</span>
                  <span style={{...S.metaI,color:calcProfit(r)>=0?"#4ade80":"#f87171"}}>利润 ${calcProfit(r).toLocaleString()}</span>
                </> : null}
              </div>
              {r.note && <p style={S.rcNote}>{r.note}</p>}
            </button>
          </div>
        );
      })}
      <div style={{...S.section,marginTop:16}}>
        <h3 style={S.secTitle}>车辆累计</h3>
        <div style={{display:"flex",gap:28,flexWrap:"wrap"}}>
          <div><p style={S.subLabel}>总次数</p><p style={S.bigNum}>{history.length}<span style={S.bigUnit}>次</span></p></div>
          <div><p style={S.subLabel}>总收入</p><p style={{...S.bigNum,color:"#4ade80"}}>${history.reduce((s,r)=>s+calcRevenue(r),0).toLocaleString()}</p></div>
          <div><p style={S.subLabel}>总工时</p><p style={S.bigNum}>{history.reduce((s,r)=>s+(Number(r.hours)||0),0)}<span style={S.bigUnit}>h</span></p></div>
        </div>
      </div>
    </div>
  );
}

// ─── Record Form ──────────────────────────────────────────
function RecordForm({ initial, defaultDate, allRecords, onSave, onCancel }) {
  const isEdit = !!initial?.id;
  const [form, setForm] = useState(() => {
    if (initial) return { ...initial, phone: initial.phone || "", plate: initial.plate || "", salePrice: initial.salePrice || "", saleCost: initial.saleCost || "",
      wageName: initial.wageName || "", wageRate: initial.wageRate || "", wageHours: initial.wageHours || "", wageSettlement: initial.wageSettlement || "",
      purchaseItem: initial.purchaseItem || "", purchaseUnitPrice: initial.purchaseUnitPrice || "", purchaseQty: initial.purchaseQty || "", purchaseTotal: initial.purchaseTotal || "",
      inventoryUsed: initial.inventoryUsed?.length ? initial.inventoryUsed : [], newParts: initial.newParts?.length ? initial.newParts : [] };
    return { id: uid(), vehicleId: "", date: defaultDate || new Date().toISOString().slice(0,10), type: "repair", customer: "", phone: "", plate: "", vehicle: "",
      inventoryUsed: [], newParts: [], quoted: "", salePrice: "", saleCost: "", hours: "",
      wageName: "", wageRate: "", wageHours: "", wageSettlement: "",
      purchaseItem: "", purchaseUnitPrice: "", purchaseQty: "", purchaseTotal: "",
      note: "" };
  });

  // Generate vehicleId from customer + phone + vehicle
  useEffect(() => {
    if (form.customer && form.vehicle) {
      const vid = generateVehicleId(form.customer, form.phone, form.vehicle, form.plate);
      setForm(f => ({...f, vehicleId: vid}));
    }
  }, [form.customer, form.phone, form.vehicle, form.plate]);

  // Build existing customer/vehicle combos for autocomplete
  const existingEntries = useMemo(() => {
    const map = {};
    allRecords.forEach(r => {
      if (r.customer && r.vehicle) {
        const key = (r.customer||"") + "|" + (r.phone||"") + "|" + (r.vehicle||"") + "|" + (r.plate||"");
        if (!map[key]) map[key] = { customer: r.customer, phone: r.phone || "", vehicle: r.vehicle, plate: r.plate || "", vehicleId: r.vehicleId };
      }
    });
    return Object.values(map);
  }, [allRecords]);

  const set = (k, v) => setForm(f => ({...f, [k]: v}));
  const addItem = (field) => setForm(f => ({...f, [field]: [...f[field], {item:"", qty:1, cost:""}]}));
  const removeItem = (field, idx) => setForm(f => ({...f, [field]: f[field].filter((_,i)=>i!==idx)}));
  const updateItem = (field, idx, key, val) => setForm(f => { const arr=[...f[field]]; arr[idx]={...arr[idx],[key]:val}; return {...f,[field]:arr}; });

  const handleEntrySelect = (entry) => {
    setForm(f => ({...f, customer: entry.customer, phone: entry.phone, vehicle: entry.vehicle, plate: entry.plate, vehicleId: entry.vehicleId}));
  };

  const handleSubmit = () => {
    if ((form.type === "repair" || form.type === "sale") && (!form.customer.trim() || !form.vehicle.trim())) return;
    if (form.type === "wage" && !form.wageName.toString().trim()) return;
    if (form.type === "purchase" && !form.purchaseItem.toString().trim()) return;
    const cleaned = { ...form, quoted: Number(form.quoted)||0, hours: Number(form.hours)||0,
      salePrice: Number(form.salePrice)||0, saleCost: Number(form.saleCost)||0,
      wageRate: Number(form.wageRate)||0, wageHours: Number(form.wageHours)||0, wageSettlement: Number(form.wageSettlement)||0,
      purchaseUnitPrice: Number(form.purchaseUnitPrice)||0, purchaseQty: Number(form.purchaseQty)||0, purchaseTotal: Number(form.purchaseTotal)||0,
      inventoryUsed: form.inventoryUsed.filter(i=>i.item.trim()).map(i=>({...i, qty:Number(i.qty)||1, cost:Number(i.cost)||0})),
      newParts: form.newParts.filter(i=>i.item.trim()).map(i=>({...i, qty:Number(i.qty)||1, cost:Number(i.cost)||0})),
    };
    // For wage/purchase, customer/vehicle are optional - use wageName/purchaseItem as fallback
    if (form.type === "wage") {
      if (!cleaned.wageName.toString().trim()) return;
      if (!cleaned.customer) cleaned.customer = cleaned.wageName.toString();
      if (!cleaned.vehicle) cleaned.vehicle = "工资记录";
    }
    if (form.type === "purchase") {
      if (!cleaned.purchaseItem.toString().trim()) return;
      if (!cleaned.customer) cleaned.customer = "采购";
      if (!cleaned.vehicle) cleaned.vehicle = cleaned.purchaseItem.toString();
    }
    if (!cleaned.vehicleId) cleaned.vehicleId = generateVehicleId(cleaned.customer, cleaned.phone, cleaned.vehicle, cleaned.plate);
    onSave(cleaned, !isEdit);
  };

  // Autocomplete suggestions based on customer name or phone
  const suggestions = useMemo(() => {
    const q = (form.customer || "").trim().toLowerCase();
    const p = (form.phone || "").trim();
    if (!q && !p) return [];
    return existingEntries.filter(e => {
      if (q && e.customer.toLowerCase().includes(q)) return true;
      if (p && p.length >= 3 && (e.phone||"").includes(p)) return true;
      return false;
    }).slice(0, 5);
  }, [form.customer, form.phone, existingEntries]);

  const [showSugg, setShowSugg] = useState(false);

    <div style={{...S.detailCol,animation:"fadeUp 0.3s ease both"}}>

        <h3 style={S.secTitle}>基本信息</h3>

            <label style={S.label}>类型</label>

              <option value="wage">工资</option>

        {/* Customer fields for repair/sale */}

                  <div style={{fontSize:11,color:"#52525b",marginTop:2}}>{e.vehicle}{e.plate ? " · " + e.plate : ""}</div>

          </div>

        {/* Wage fields */}
        {form.type === "wage" && <>

          <div style={S.field}>

          </div>
        </>}

        {/* Purchase fields */}
        {form.type === "purchase" && <>

          <span style={{fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Mono',monospace",color:
            (form.type==="sale"
              ? (Number(form.salePrice||0)-Number(form.saleCost||0))

            )>=0?"#4ade80":"#f87171"
          }}>{form.type==="wage"||form.type==="purchase"?"-":""}${Math.abs(
            form.type==="sale"
              ? (Number(form.salePrice||0)-Number(form.saleCost||0))
              : form.type==="wage"
              ? Number(form.wageSettlement||0)
              : form.type==="purchase"
              ? Number(form.purchaseTotal||0)
              : (Number(form.quoted||0)-sumItems(form.inventoryUsed)-sumItems(form.newParts))
          ).toLocaleString()}</span>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button style={S.cancelBtn} onClick={onCancel}>取消</button>
          <button style={{...S.saveBtn,opacity:(
            (form.type==="repair"||form.type==="sale") ? (!form.customer.trim()||!form.vehicle.trim()) :

            form.type==="purchase" ? !form.purchaseItem.toString().trim() : true
          )?0.4:1}} disabled={(
            (form.type==="repair"||form.type==="sale") ? (!form.customer.trim()||!form.vehicle.trim()) :
            form.type==="wage" ? !form.wageName.toString().trim() :
            form.type==="purchase" ? !form.purchaseItem.toString().trim() : true
          )} onClick={handleSubmit}>
            <ISave/><span style={{marginLeft:6}}>{isEdit?"保存修改":"保存记录"}</span>
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Export Helpers ────────────────────────────────────────
function getRecordsInRange(records, startDate, endDate) {
  const all = [];
  Object.keys(records).sort().forEach(dk => {
    if (dk >= startDate && dk <= endDate && Array.isArray(records[dk])) {
      records[dk].forEach(r => all.push(r));
    }
  });
  return all;
}

function buildExportRows(recs) {
  const rows = [];
  recs.forEach(r => {
    const invTotal = sumItems(r.inventoryUsed);
    const npTotal = sumItems(r.newParts);
    const profit = Number(r.quoted || 0) - invTotal - npTotal;
    rows.push({
      date: r.date,
      type: r.type === "repair" ? "维修" : "出售",
      customer: r.customer,
      phone: r.phone || "",
      plate: r.plate || "",
      vehicle: r.vehicle,
      invItems: (r.inventoryUsed || []).map(i => `${i.item} x${i.qty} $${i.cost * i.qty}`).join("; "),
      invTotal,
      newItems: (r.newParts || []).map(i => `${i.item} x${i.qty} $${i.cost * i.qty}`).join("; "),
      npTotal,
      quoted: Number(r.quoted || 0),
      profit,
      hours: Number(r.hours || 0),
      note: r.note || "",
    });
  });
  return rows;
}

function exportCSV(rows) {
  const headers = ["日期","类型","客户","车辆","库存出库明细","库存出库合计","新购配件明细","新购配件合计","报价收入","利润","工时","备注"];
  const csvRows = [headers.join(",")];
  rows.forEach(r => {
    csvRows.push([r.date, r.type, `"${r.customer}"`, `"${r.vehicle}"`, `"${r.invItems}"`, r.invTotal, `"${r.newItems}"`, r.npTotal, r.quoted, r.profit, r.hours, `"${r.note}"`].join(","));
  });
  return "\uFEFF" + csvRows.join("\n");
}

function downloadFile(content, filename, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportExcel(rows, startDate, endDate) {
  // Build a simple XLSX using XML spreadsheet format (compatible with Excel)
  const escXml = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  const headers = ["日期","类型","客户","车辆","库存出库明细","库存出库($)","新购配件明细","新购配件($)","报价收入($)","利润($)","工时(h)","备注"];
  let xml = '<?xml version="1.0" encoding="UTF-8"?>\n<?mso-application progid="Excel.Sheet"?>\n';
  xml += '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">\n';
  xml += '<Styles><Style ss:ID="h"><Font ss:Bold="1" ss:Size="11"/><Interior ss:Color="#1e3a5f" ss:Pattern="Solid"/><Font ss:Color="#ffffff" ss:Bold="1"/></Style>';
  xml += '<Style ss:ID="n"><NumberFormat ss:Format="#,##0.00"/></Style>';
  xml += '<Style ss:ID="g"><Font ss:Color="#22c55e" ss:Bold="1"/><NumberFormat ss:Format="#,##0.00"/></Style></Styles>\n';
  xml += `<Worksheet ss:Name="维修记录 ${startDate} to ${endDate}"><Table>\n`;
  // Column widths
  [90,50,80,160,200,80,200,80,80,80,50,200].forEach(w => { xml += `<Column ss:Width="${w}"/>\n`; });
  // Header row
  xml += '<Row ss:StyleID="h">';
  headers.forEach(h => { xml += `<Cell><Data ss:Type="String">${escXml(h)}</Data></Cell>`; });
  xml += '</Row>\n';
  // Data rows
  rows.forEach(r => {
    xml += '<Row>';
    xml += `<Cell><Data ss:Type="String">${escXml(r.date)}</Data></Cell>`;
    xml += `<Cell><Data ss:Type="String">${escXml(r.type)}</Data></Cell>`;
    xml += `<Cell><Data ss:Type="String">${escXml(r.customer)}</Data></Cell>`;
    xml += `<Cell><Data ss:Type="String">${escXml(r.vehicle)}</Data></Cell>`;
    xml += `<Cell><Data ss:Type="String">${escXml(r.invItems)}</Data></Cell>`;
    xml += `<Cell ss:StyleID="n"><Data ss:Type="Number">${r.invTotal}</Data></Cell>`;
    xml += `<Cell><Data ss:Type="String">${escXml(r.newItems)}</Data></Cell>`;
    xml += `<Cell ss:StyleID="n"><Data ss:Type="Number">${r.npTotal}</Data></Cell>`;
    xml += `<Cell ss:StyleID="n"><Data ss:Type="Number">${r.quoted}</Data></Cell>`;
    xml += `<Cell ss:StyleID="g"><Data ss:Type="Number">${r.profit}</Data></Cell>`;
    xml += `<Cell ss:StyleID="n"><Data ss:Type="Number">${r.hours}</Data></Cell>`;
    xml += `<Cell><Data ss:Type="String">${escXml(r.note)}</Data></Cell>`;
    xml += '</Row>\n';
  });
  // Summary row
  const totInv = rows.reduce((s,r) => s+r.invTotal, 0);
  const totNp = rows.reduce((s,r) => s+r.npTotal, 0);
  const totQ = rows.reduce((s,r) => s+r.quoted, 0);
  const totP = rows.reduce((s,r) => s+r.profit, 0);
  const totH = rows.reduce((s,r) => s+r.hours, 0);
  xml += '<Row><Cell/><Cell/><Cell/><Cell><Data ss:Type="String">合计</Data></Cell><Cell/>';
  xml += `<Cell ss:StyleID="n"><Data ss:Type="Number">${totInv}</Data></Cell><Cell/>`;
  xml += `<Cell ss:StyleID="n"><Data ss:Type="Number">${totNp}</Data></Cell>`;
  xml += `<Cell ss:StyleID="n"><Data ss:Type="Number">${totQ}</Data></Cell>`;
  xml += `<Cell ss:StyleID="g"><Data ss:Type="Number">${totP}</Data></Cell>`;
  xml += `<Cell ss:StyleID="n"><Data ss:Type="Number">${totH}</Data></Cell>`;
  xml += '<Cell/></Row>\n';
  xml += '</Table></Worksheet></Workbook>';
  downloadFile(xml, `维修记录_${startDate}_${endDate}.xls`, "application/vnd.ms-excel");
}

function SearchView({ allRecords, onSelectRecord, onSelectVehicle }) {
  const [query, setQuery] = useState("");
  const inputRef = React.createRef();

  useEffect(() => { if (inputRef.current) inputRef.current.focus(); }, []);

  // Build unique customers/vehicles for suggestions
  const searchIndex = useMemo(() => {
    const customers = {};
    allRecords.forEach(r => {
      const key = (r.customer||"") + "|" + (r.phone||"") + "|" + (r.vehicle||"") + "|" + (r.plate||"");
      if (!customers[key]) {
        customers[key] = { customer: r.customer, phone: r.phone || "", vehicle: r.vehicle, plate: r.plate || "", vehicleId: r.vehicleId, count: 0, lastDate: r.date };
      }
      customers[key].count++;
      if (r.date > customers[key].lastDate) customers[key].lastDate = r.date;
    });
    return Object.values(customers);
  }, [allRecords]);

  const results = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return [];
    return searchIndex.filter(e => {
      if (e.customer.toLowerCase().includes(q)) return true;
      if ((e.phone||"").includes(q)) return true;
      if (e.vehicle.toLowerCase().includes(q)) return true;
      if ((e.plate||"").toLowerCase().includes(q)) return true;
      return false;
    }).sort((a,b) => b.lastDate.localeCompare(a.lastDate)).slice(0, 20);
  }, [query, searchIndex]);

  // Get all records for a specific vehicle
  const getVehicleRecords = (vehicleId) => {
    return allRecords.filter(r => r.vehicleId === vehicleId).sort((a,b) => b.date.localeCompare(a.date));
  };

  const [expandedVid, setExpandedVid] = useState(null);

  return (
    <div style={{...S.listCol,animation:"fadeUp 0.3s ease both"}}>
      {/* Search input */}
      <div style={{position:"relative"}}>
        <div style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:"#52525b",pointerEvents:"none"}}><ISearch/></div>
        <input ref={inputRef} value={query} onChange={e=>setQuery(e.target.value)} placeholder="输入客户名、手机号、车型或车牌号..." style={{...S.input,paddingLeft:42,fontSize:16,padding:"14px 14px 14px 42px",borderRadius:12}}/>
      </div>

      {/* Quick stats */}
      {!query && (
        <div style={{...S.section,textAlign:"center",padding:"24px 18px"}}>
          <p style={{color:"#52525b",fontSize:13,margin:0}}>输入关键词搜索客户的历史记录</p>
          <p style={{color:"#3f3f46",fontSize:12,margin:"8px 0 0"}}>支持搜索：客户名、手机号、车型、车牌号</p>
          <p style={{color:"#3f3f46",fontSize:12,margin:"4px 0 0"}}>共 {searchIndex.length} 个客户/车辆</p>
        </div>
      )}

      {/* Results */}
      {query && results.length === 0 && (
        <div style={{textAlign:"center",padding:"40px 20px"}}>
          <p style={{color:"#52525b",fontSize:14}}>没有找到匹配的记录</p>
        </div>
      )}

      {results.map((e, i) => {
        const isExpanded = expandedVid === e.vehicleId;
        const vRecords = isExpanded ? getVehicleRecords(e.vehicleId) : [];
        return (
          <div key={e.vehicleId + i} style={{animation:"fadeUp 0.3s ease both",animationDelay:i*40+"ms"}}>
            <button style={{...S.recordCard,marginBottom:0}} onClick={() => setExpandedVid(isExpanded ? null : e.vehicleId)}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                    <span style={S.custName}>{e.customer}</span>
                    <span style={{fontSize:11,color:"#71717a",fontFamily:"'IBM Plex Mono',monospace",background:"rgba(255,255,255,0.04)",padding:"1px 6px",borderRadius:4}}>{e.count}次</span>
                  </div>
                  {e.phone && <div style={{display:"flex",alignItems:"center",gap:4,fontSize:12,color:"#71717a",marginBottom:3}}><IPhone/>{e.phone}</div>}
                  <div style={{display:"flex",alignItems:"center",gap:4,fontSize:12.5,color:"#a1a1aa"}}><ICar/><span style={{marginLeft:2}}>{e.vehicle}{e.plate ? " · "+e.plate : ""}</span></div>
                </div>
                <div style={{color:"#3f3f46",transform:isExpanded?"rotate(90deg)":"none",transition:"transform 0.2s"}}><IChevronR/></div>
              </div>
            </button>

            {/* Expanded: show all records for this vehicle */}
            {isExpanded && (
              <div style={{borderLeft:"2px solid rgba(96,165,250,0.2)",marginLeft:16,paddingLeft:12,marginTop:6,marginBottom:10}}>
                {vRecords.map((r,j) => {
                  const inv = sumItems(r.inventoryUsed);
                  const np = sumItems(r.newParts);
                  const profit = calcProfit(r);
                  return (
                    <button key={r.id} style={{...S.recordCard,padding:12,marginBottom:6,animation:"fadeUp 0.25s ease both",animationDelay:j*30+"ms"}} onClick={() => onSelectRecord(r)}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <span style={{fontSize:12,fontFamily:"'IBM Plex Mono',monospace",color:"#a1a1aa"}}>{fmtDate(r.date)}</span>
                          <span style={S.badge(r.type)}>{typeLabel(r.type)}</span>
                        </div>
                        <span style={{fontSize:13,fontWeight:600,fontFamily:"'IBM Plex Mono',monospace",color:"#4ade80"}}>${calcRevenue(r).toLocaleString()}</span>
                      </div>
                      <div style={S.rcMeta}>
                        <span style={S.metaI}><IWrench/> ${inv}</span>
                        <span style={S.metaI}><ITag/> ${np}</span>
                        <span style={{...S.metaI,color:profit>=0?"#4ade80":"#f87171"}}>利润 ${profit.toLocaleString()}</span>
                      </div>
                      {r.note && <p style={{fontSize:11,color:"#52525b",margin:"6px 0 0",lineHeight:1.4}}>{r.note}</p>}
                    </button>
                  );
                })}
                <div style={{display:"flex",gap:12,padding:"6px 0",fontSize:12,color:"#71717a",flexWrap:"wrap"}}>
                  <span>总计: <span style={{color:"#4ade80",fontFamily:"'IBM Plex Mono',monospace"}}>${vRecords.reduce((s,r)=>s+Number(r.quoted||0),0).toLocaleString()}</span></span>
                  <span>利润: <span style={{color:"#4ade80",fontFamily:"'IBM Plex Mono',monospace"}}>${vRecords.reduce((s,r)=>s+Number(r.quoted||0)-sumItems(r.inventoryUsed)-sumItems(r.newParts),0).toLocaleString()}</span></span>
                  <span>工时: <span style={{fontFamily:"'IBM Plex Mono',monospace"}}>{vRecords.reduce((s,r)=>s+Number(r.hours||0),0)}h</span></span>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function CloudSetup({ onComplete }) {
  const [apiKey, setApiKey] = useState("");
  const [binId, setBinId] = useState("");
  const [mode, setMode] = useState("new"); // new | existing
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const handleSetup = async () => {
    if (!apiKey.trim()) { setError("请输入 Access Key"); return; }
    setLoading(true);
    setError("");
    try {
      if (mode === "new") {
        const newBinId = await cloudCreateBin(apiKey.trim());
        // If there's existing local data, push it to cloud
        const local = loadLocalCache();
        if (local && Object.keys(local).length > 0) {
          await cloudSave({ apiKey: apiKey.trim(), binId: newBinId }, local);
        }
        onComplete({ apiKey: apiKey.trim(), binId: newBinId });
      } else {
        if (!binId.trim()) { setError("请输入 Bin ID"); setLoading(false); return; }
        // Verify connection
        await cloudLoad({ apiKey: apiKey.trim(), binId: binId.trim() });
        onComplete({ apiKey: apiKey.trim(), binId: binId.trim() });
      }
    } catch(e) {
      setError("连接失败: " + e.message);
    }
    setLoading(false);
  };

  return (
    <div style={{...S.root,display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:20}}>
      <div style={{maxWidth:420,width:"100%",animation:"fadeUp 0.4s ease both"}}>
        <div style={{textAlign:"center",marginBottom:32}}>

            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 10h-1.26A8 8 0 109 20h9a5 5 0 000-10z"/></svg>

          <p style={{fontSize:13,color:"#71717a",margin:0,lineHeight:1.5}}>连接 JSONBin.io 实现多设备数据共享</p>
        </div>

        <div style={S.section}>
          <h3 style={S.secTitle}>第一步：获取 Access Key</h3>
          <p style={{fontSize:12,color:"#71717a",margin:"0 0 12px",lineHeight:1.6}}>
            1. 打开 <span style={{color:"#60a5fa"}}>jsonbin.io</span> 注册免费账号<br/>

        <div style={{...S.section,marginTop:12}}>

          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <button onClick={()=>setMode("new")} style={{flex:1,padding:"10px 12px",borderRadius:10,border:mode==="new"?"1px solid rgba(96,165,250,0.4)":"1px solid rgba(255,255,255,0.06)",background:mode==="new"?"rgba(96,165,250,0.1)":"rgba(255,255,255,0.02)",color:mode==="new"?"#93c5fd":"#71717a",fontSize:13,fontFamily:"'Noto Sans SC',sans-serif",textAlign:"center",cursor:"pointer"}}>
              全新开始<br/><span style={{fontSize:11,opacity:0.7}}>创建新的数据库</span>
            </button>
            <button onClick={()=>setMode("existing")} style={{flex:1,padding:"10px 12px",borderRadius:10,border:mode==="existing"?"1px solid rgba(96,165,250,0.4)":"1px solid rgba(255,255,255,0.06)",background:mode==="existing"?"rgba(96,165,250,0.1)":"rgba(255,255,255,0.02)",color:mode==="existing"?"#93c5fd":"#71717a",fontSize:13,fontFamily:"'Noto Sans SC',sans-serif",textAlign:"center",cursor:"pointer"}}>

            <div>

            </div>
          )}

            <p style={{fontSize:12,color:"#52525b",margin:0,lineHeight:1.5}}>将自动创建数据库。创建后在设置页面可以看到 Bin ID，分享给同事让他们选「连接已有」即可。</p>

        </button>
      </div>
    </div>
  );
}

        {cloudCfg ? (
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:syncStatus==="ok"?"#4ade80":syncStatus==="error"?"#f87171":"#fbbf24"}}/>
              <span style={{fontSize:13,color:syncStatus==="ok"?"#4ade80":syncStatus==="error"?"#f87171":"#fbbf24"}}>
                {syncStatus==="ok"?"已连接 · 数据已同步":syncStatus==="error"?"同步出错":"同步中..."}
              </span>
            </div>
            <div style={{background:"rgba(255,255,255,0.03)",borderRadius:8,padding:"10px 12px",marginBottom:12}}>
              <p style={{fontSize:11,color:"#52525b",margin:"0 0 4px"}}>Bin ID（分享给同事加入同一数据库）：</p>
              <p style={{fontSize:13,color:"#93c5fd",margin:0,fontFamily:"'IBM Plex Mono',monospace",wordBreak:"break-all",userSelect:"all"}}>{cloudCfg.binId}</p>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button style={{
                flex:1,background:"rgba(96,165,250,0.08)",border:"1px solid rgba(96,165,250,0.2)",borderRadius:10,
                color:"#93c5fd",fontSize:12.5,padding:"9px 14px",cursor:"pointer",fontFamily:"'Noto Sans SC',sans-serif",
                display:"flex",alignItems:"center",justifyContent:"center",gap:5,
              }} onClick={onRefresh}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 4v6h6M23 20v-6h-6M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>
                手动刷新
              </button>
              <button style={{
                flex:1,background:"rgba(248,113,113,0.06)",border:"1px solid rgba(248,113,113,0.15)",borderRadius:10,
                color:"#f87171",fontSize:12.5,padding:"9px 14px",cursor:"pointer",fontFamily:"'Noto Sans SC',sans-serif",
              }} onClick={onCloudDisconnect}>断开连接</button>
            </div>
          </div>
        ) : (
          <p style={{fontSize:12.5,color:"#71717a",margin:0}}>未连接云端</p>
        )}
      </div>

      {/* Data.json Backup & Restore */}
      <div style={S.section}>
        <h3 style={S.secTitle}>数据备份 (data.json)</h3>
        <p style={{fontSize:12,color:"#71717a",margin:"0 0 14px",lineHeight:1.5}}>将全部数据备份为 data.json 文件，或从 data.json 文件恢复数据。</p>
        <div style={{display:"flex",gap:10,marginBottom:10}}>
          <button style={{
            flex:1,background:"rgba(168,85,247,0.08)",border:"1px solid rgba(168,85,247,0.2)",borderRadius:10,
            color:"#c084fc",fontSize:13,fontWeight:500,padding:"11px 16px",cursor:"pointer",
            fontFamily:"'Noto Sans SC',sans-serif",display:"flex",alignItems:"center",justifyContent:"center",gap:6,
          }} onClick={() => exportDataJSON(records)}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            备份 data.json
          </button>
          <button style={{
            flex:1,background:"rgba(251,191,36,0.08)",border:"1px solid rgba(251,191,36,0.2)",borderRadius:10,
            color:"#fbbf24",fontSize:13,fontWeight:500,padding:"11px 16px",cursor:"pointer",
            fontFamily:"'Noto Sans SC',sans-serif",display:"flex",alignItems:"center",justifyContent:"center",gap:6,
          }} onClick={() => fileInputRef.current && fileInputRef.current.click()}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
            导入 data.json
          </button>
          <input ref={fileInputRef} type="file" accept=".json" style={{display:"none"}} onChange={async (e) => {
            const file = e.target.files?.[0];
            if (!file) return;
            try {
              const data = await importDataJSON(file);
              onImport(data);
              setImportMsg("导入成功！共 " + Object.values(data).flat().length + " 条记录");
            } catch(err) {
              setImportMsg("导入失败：文件格式不正确");
            }
            setTimeout(() => setImportMsg(""), 3000);
            e.target.value = "";
          }}/>
        </div>
        {importMsg && (
          <div style={{padding:"10px 14px",background:importMsg.includes("成功")?"rgba(74,222,128,0.06)":"rgba(248,113,113,0.06)",border:importMsg.includes("成功")?"1px solid rgba(74,222,128,0.15)":"1px solid rgba(248,113,113,0.15)",borderRadius:8,textAlign:"center"}}>
            <p style={{fontSize:12.5,color:importMsg.includes("成功")?"#4ade80":"#f87171",margin:0}}>{importMsg}</p>
          </div>
        )}
      </div>

      {/* Export Section */}
      <div style={S.section}>
        <h3 style={S.secTitle}>导出数据</h3>
        <p style={{fontSize:12,color:"#71717a",margin:"0 0 14px",lineHeight:1.5}}>选择日期范围，导出为 Excel 或 PDF 报表。</p>
        
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
          <div>
            <label style={{display:"block",fontSize:11,color:"#71717a",marginBottom:5}}>开始日期</label>
            <input type="date" value={exportStart} onChange={e => setExportStart(e.target.value)}
              style={{width:"100%",boxSizing:"border-box",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,color:"#e4e4e7",fontSize:13,padding:"9px 12px",fontFamily:"'Noto Sans SC',sans-serif"}}/>
          </div>
          <div>
            <label style={{display:"block",fontSize:11,color:"#71717a",marginBottom:5}}>结束日期</label>
            <input type="date" value={exportEnd} onChange={e => setExportEnd(e.target.value)}
              style={{width:"100%",boxSizing:"border-box",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,color:"#e4e4e7",fontSize:13,padding:"9px 12px",fontFamily:"'Noto Sans SC',sans-serif"}}/>
          </div>
        </div>

        <p style={{fontSize:12,color:"#a1a1aa",margin:"0 0 14px"}}>
          范围内共 <span style={{color:"#fafafa",fontWeight:600,fontFamily:"'IBM Plex Mono',monospace"}}>{previewCount}</span> 条记录
        </p>

        <div style={{display:"flex",gap:10}}>
          <button style={{
            flex:1,background:"rgba(74,222,128,0.08)",border:"1px solid rgba(74,222,128,0.2)",borderRadius:10,
            color:"#4ade80",fontSize:13,fontWeight:500,padding:"11px 16px",cursor:"pointer",
            fontFamily:"'Noto Sans SC',sans-serif",display:"flex",alignItems:"center",justifyContent:"center",gap:6,
            opacity: previewCount === 0 ? 0.4 : 1,
          }} onClick={() => handleExport("excel")}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            导出 Excel
          </button>
          <button style={{
            flex:1,background:"rgba(96,165,250,0.08)",border:"1px solid rgba(96,165,250,0.2)",borderRadius:10,
            color:"#93c5fd",fontSize:13,fontWeight:500,padding:"11px 16px",cursor:"pointer",
            fontFamily:"'Noto Sans SC',sans-serif",display:"flex",alignItems:"center",justifyContent:"center",gap:6,
            opacity: previewCount === 0 ? 0.4 : 1,
          }} onClick={() => handleExport("pdf")}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            导出 PDF
          </button>
        </div>

        {exportMsg && (
          <div style={{marginTop:10,padding:"10px 14px",background:"rgba(74,222,128,0.06)",border:"1px solid rgba(74,222,128,0.15)",borderRadius:8,textAlign:"center"}}>
            <p style={{fontSize:12.5,color:"#4ade80",margin:0}}>{exportMsg}</p>
          </div>
        )}
      </div>

      {/* Danger Zone */}
      <div style={{...S.section,borderColor:step===1?"rgba(248,113,113,0.25)":"rgba(255,255,255,0.055)"}}>
        <h3 style={{...S.secTitle,color:"#f87171"}}>危险操作</h3>
        <p style={{fontSize:12.5,color:"#71717a",margin:"0 0 14px",lineHeight:1.5}}>清空所有记录数据，包括所有周的维修和出售记录。此操作不可恢复。</p>
        
        {step === 0 && (
          <button style={{
            background:"rgba(248,113,113,0.08)",border:"1px solid rgba(248,113,113,0.2)",borderRadius:10,
            color:"#f87171",fontSize:13,padding:"10px 18px",cursor:"pointer",width:"100%",
            fontFamily:"'Noto Sans SC',sans-serif",display:"flex",alignItems:"center",justifyContent:"center",gap:6,
          }} onClick={()=>setStep(1)}>
            <IWarn/> 清空所有数据
          </button>
        )}

        {step === 1 && (
          <div style={{background:"rgba(248,113,113,0.06)",border:"1px solid rgba(248,113,113,0.2)",borderRadius:10,padding:16}}>
            <p style={{fontSize:13,color:"#fca5a5",margin:"0 0 12px",fontWeight:500}}>确定要删除全部 {totalRecords} 条记录吗？</p>
            <p style={{fontSize:12,color:"#71717a",margin:"0 0 14px"}}>此操作无法撤销，所有数据将永久丢失。</p>
            <div style={{display:"flex",gap:10}}>
              <button style={{
                flex:1,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,
                color:"#a1a1aa",fontSize:13,padding:"9px 14px",cursor:"pointer",fontFamily:"'Noto Sans SC',sans-serif",
              }} onClick={()=>setStep(0)}>取消</button>
              <button style={{
                flex:1,background:"rgba(248,113,113,0.2)",border:"1px solid rgba(248,113,113,0.4)",borderRadius:8,
                color:"#fca5a5",fontSize:13,fontWeight:600,padding:"9px 14px",cursor:"pointer",fontFamily:"'Noto Sans SC',sans-serif",
              }} onClick={doReset}>确认删除全部</button>
            </div>
          </div>
        )}

        {step === 2 && (
          <div style={{background:"rgba(74,222,128,0.06)",border:"1px solid rgba(74,222,128,0.2)",borderRadius:10,padding:"12px 16px",textAlign:"center"}}>
            <p style={{fontSize:13,color:"#4ade80",margin:0}}>已清空全部数据</p>
          </div>
        )}
      </div>
    </div>
  );
}
